services:
  loma-backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    # Loopback only — reached externally through the nginx proxy, not directly.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - loma-skill-assets:/var/lib/loma/skill-assets
      # Mount the real .env so the dashboard Environment admin (/api/env) can read & edit it.
      # env_file injects values into the process env, but does not place a file at /app/.env.
      - ./.env:/app/.env
      # Persist connected Claude Code accounts (CLAUDE_USERS_DIR) across container
      # recreation — otherwise `claude login` creds are lost on every rebuild/redeploy.
      - loma-claude-users:/opt/claude-users
    restart: unless-stopped

  loma-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Login UI: "local" (default), "google", or "local,google". Build-time
        # (NEXT_PUBLIC_*); set NEXT_PUBLIC_AUTH_PROVIDER in the project .env and
        # rebuild. The runtime AUTH_PROVIDER lives in dashboard/.env.
        NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-local}
    env_file: ./dashboard/.env
    environment:
      BACKEND_URL: http://loma-backend:3000
    # Loopback only — reached externally through the nginx proxy, not directly.
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - loma-backend
    restart: unless-stopped

  # Single external entrypoint. Serves the dashboard on :80 and routes /api +
  # webhooks to the backend over the internal network, so :3000/:3001 need not
  # be exposed. For HTTPS on :443 see deploy/nginx/README.md.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certbot/www:/var/www/certbot:ro
      - ./deploy/nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - loma-backend
      - loma-dashboard
    restart: unless-stopped

  # Phase 2 (HTTPS): obtain/renew Let's Encrypt certs via the webroot challenge.
  # Disabled by default (only runs with `--profile certbot`). See deploy/nginx/README.md.
  certbot:
    image: certbot/certbot
    profiles: ["certbot"]
    volumes:
      - ./deploy/nginx/certbot/conf:/etc/letsencrypt
      - ./deploy/nginx/certbot/www:/var/www/certbot

volumes:
  loma-skill-assets:
  loma-claude-users:

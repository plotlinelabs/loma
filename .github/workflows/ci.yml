name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  public-content-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Block private/internal markers
        run: python scripts/check_public_content.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Block committed secret patterns
        run: python scripts/check_secrets.py

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Syntax check
        run: python -m compileall -q .
      - name: Tests
        run: pytest -q

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: dashboard
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
        working-directory: dashboard
      - name: Build
        run: npm run build
        working-directory: dashboard

  deploy:
    needs: [public-content-scan, secret-scan, backend, dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 600 /dev/null key
          printf '%s\n' "$SSH_KEY" > key
          ssh -i key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=40 \
            "$SSH_USER@$SSH_HOST" \
            'set -e; cd ~/loma; git fetch origin --prune; git reset --hard origin/main; bash scripts/deploy.sh'

  # Post a deploy notification to a webhook (e.g. a Loma webhook flow that relays
  # to Slack). Runs only after a successful deploy (inherits the implicit success()
  # gate from `needs`), so it is skipped on PRs and on forks where the deploy job
  # never runs. The endpoint lives entirely in the DEPLOY_NOTIFY_WEBHOOK_URL secret —
  # nothing is exposed in this public file — and the step no-ops when it is unset.
  notify:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_TOKEN }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.actor }}
          REF: ${{ github.ref }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_NOTIFY_WEBHOOK_URL not set — skipping deploy notification."
            exit 0
          fi
          # PR number from the squash-merge commit subject, e.g. "… (#25)".
          PR_NUMBER=$(printf '%s' "$HEAD_MSG" | grep -oP '#\K[0-9]+' | head -1 || echo "")
          payload=$(jq -n \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg pr "$PR_NUMBER" \
            --argjson commits "${COMMITS_JSON:-[]}" \
            --arg sender "$SENDER" \
            '{repo: $repo, ref: $ref, pr_number: $pr, commits: $commits, sender: $sender}')
          # Optional bearer auth — sent only if the flow uses bearer_token auth.
          auth=()
          if [ -n "$WEBHOOK_TOKEN" ]; then
            auth=(-H "Authorization: Bearer $WEBHOOK_TOKEN")
          fi
          # The deploy restarts the stack, so the webhook host is briefly down.
          # Wait for it to come back, then retry to ride out any remaining blip.
          sleep 30
          curl -sS --fail-with-body -X POST "$WEBHOOK_URL" \
            --retry 5 --retry-delay 10 --retry-connrefused --retry-all-errors \
            -H "Content-Type: application/json" \
            "${auth[@]}" \
            -d "$payload"

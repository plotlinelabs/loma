name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  public-content-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Block private/internal markers
        run: python scripts/check_public_content.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Block committed secret patterns
        run: python scripts/check_secrets.py

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Syntax check
        run: python -m compileall -q .
      - name: Tests
        run: pytest -q

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: dashboard
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
        working-directory: dashboard
      - name: Build
        run: npm run build
        working-directory: dashboard

  deploy:
    needs: [public-content-scan, secret-scan, backend, dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 600 /dev/null key
          printf '%s' "$SSH_KEY" > key
          ssh -i key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" \
            'set -e; cd ~/loma; git fetch origin --prune; git reset --hard origin/main; bash scripts/deploy.sh'

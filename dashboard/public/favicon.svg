<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glassDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="80%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glassLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#0A0A0A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="glassReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="85%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glassShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#0A0A0A" flood-opacity="0.35"/>
    </filter>
    <clipPath id="topHalf60"><rect x="38" y="38" width="44" height="20"/></clipPath>
    <clipPath id="topHalf100"><rect x="78" y="38" width="44" height="20"/></clipPath>
    <clipPath id="topHalf60b"><rect x="38" y="78" width="44" height="20"/></clipPath>
    <clipPath id="topHalf100b"><rect x="78" y="78" width="44" height="20"/></clipPath>
  </defs>
  <rect width="160" height="160" rx="24" fill="#E8FF5A"/>
  <line x1="60" y1="20" x2="60" y2="140" stroke="#0A0A0A" stroke-width="2" opacity="0.1"/>
  <line x1="100" y1="20" x2="100" y2="140" stroke="#0A0A0A" stroke-width="2" opacity="0.1"/>
  <line x1="20" y1="60" x2="140" y2="60" stroke="#0A0A0A" stroke-width="2" opacity="0.1"/>
  <line x1="20" y1="100" x2="140" y2="100" stroke="#0A0A0A" stroke-width="2" opacity="0.1"/>
  <circle cx="60" cy="60" r="18" fill="url(#glassDark)" filter="url(#glassShadow)"/>
  <circle cx="60" cy="60" r="17" fill="url(#rimLight)"/>
  <ellipse cx="60" cy="54" rx="13" ry="8" fill="url(#glassReflect)" clip-path="url(#topHalf60)"/>
  <circle cx="100" cy="60" r="18" fill="url(#glassLight)" filter="url(#glassShadow)"/>
  <circle cx="100" cy="60" r="17" fill="url(#rimLight)" opacity="0.5"/>

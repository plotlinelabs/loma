  <circle cx="60" cy="100" r="18" fill="url(#glassLight)" filter="url(#glassShadow)"/>
  <circle cx="60" cy="100" r="17" fill="url(#rimLight)" opacity="0.5"/>
  <ellipse cx="60" cy="94" rx="13" ry="8" fill="url(#glassReflect)" opacity="0.4" clip-path="url(#topHalf60b)"/>
  <circle cx="100" cy="100" r="18" fill="url(#glassDark)" filter="url(#glassShadow)"/>
  <circle cx="100" cy="100" r="17" fill="url(#rimLight)"/>
